name: CI

on:
  push:
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Package tests
    runs-on: macos-26
    strategy:
      matrix:
        xcode:
          - '26.3'
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Run Swift package tests
        run: swift test

  example-tests:
    name: Example tests
    runs-on: macos-26
    strategy:
      matrix:
        xcode:
          - '26.3'
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Install tools
        uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ github.token }}
      - name: List available simulators
        run: xcrun simctl list devices available
      - name: Select iPhone simulator
        run: |
          SIMULATOR_ID="$(xcrun simctl list --json devices available iPhone | jq -r '[.devices | to_entries | sort_by(.key) | reverse | .[].value | select(length > 0) | .[0]][0].udid')"
          test -n "$SIMULATOR_ID"
          test "$SIMULATOR_ID" != "null"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"
      - name: Generate Tuist workspace
        run: |
          tuist install
          tuist generate --no-open
        working-directory: Examples
      - name: Run example tests
        run: |
          xcodebuild test \
            -workspace MotionManager.xcworkspace \
            -scheme MotionManager \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath DerivedDataTuist \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
        working-directory: Examples
