name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Swift package
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Print and verify tool versions
        run: |
          xcodebuild -version | tee /tmp/xcode-version.txt
          swift --version | tee /tmp/swift-version.txt
          grep -q '^Xcode 26\.5$' /tmp/xcode-version.txt
          grep -q 'Swift version 6\.3' /tmp/swift-version.txt

      - name: Test package
        run: make test-package

  examples:
    name: Tuist examples
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Print and verify tool versions
        run: |
          xcodebuild -version | tee /tmp/xcode-version.txt
          swift --version | tee /tmp/swift-version.txt
          grep -q '^Xcode 26\.5$' /tmp/xcode-version.txt
          grep -q 'Swift version 6\.3' /tmp/swift-version.txt
          tuist version

      - name: Build and test examples
        run: make test-examples
